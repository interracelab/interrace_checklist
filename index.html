<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인테라스 인테리어 공사 체크리스트 300</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard',sans-serif;font-size:14px;background:#f8f8f6;color:#1a1a1a}
.wrap{max-width:720px;margin:0 auto;padding:2rem 1rem 4rem}
.brand{font-size:12px;color:#888;margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:2rem}
.info-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.info-grid.three{grid-template-columns:1fr 1fr 1fr}
.field-label{font-size:12px;color:#666;margin-bottom:5px}
.field-label span{color:#e24b4a}
input,select{width:100%;padding:8px 10px;font-size:13px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus{border-color:#1a1a1a}
.progress-wrap{margin-bottom:1.25rem}
.progress-top{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-label{font-size:12px;color:#666}
.progress-count{font-size:12px;font-weight:600}
.prog-track{height:6px;background:#ebebeb;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .3s}
.tab-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.tab{padding:6px 14px;font-size:12px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#666;cursor:pointer}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.checklist-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.cat-header{padding:10px 16px;background:#f8f8f6;border-bottom:1px solid #e8e8e8;font-size:12px;font-weight:600;color:#444;display:flex;justify-content:space-between}
.check-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
.check-item:last-child{border-bottom:none}
.check-item:hover{background:#fafafa}
.check-item.checked{background:#f0faf5}
.check-box{width:18px;height:18px;border:1.5px solid #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff}
.check-item.checked .check-box{background:#1D9E75;border-color:#1D9E75}
.check-item.checked .check-box::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.num-badge{font-size:11px;color:#aaa;min-width:28px;flex-shrink:0}
.item-text{font-size:13px;line-height:1.5}
.check-item.checked .item-text{color:#999;text-decoration:line-through}
.submit-btn{width:100%;padding:14px;font-size:15px;font-weight:600;background:#1a1a1a;color:#fff;border:none;border-radius:12px;cursor:pointer;margin-top:.5rem}
.submit-btn:hover{background:#333}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.success-box{background:#f0faf5;border:1px solid #9FE1CB;border-radius:12px;padding:2rem;text-align:center;display:none;margin-top:1rem}
.success-box .icon{font-size:36px;color:#1D9E75;margin-bottom:8px}
.success-box p{font-size:15px;font-weight:600;color:#085041}
.success-box small{font-size:13px;color:#666;margin-top:4px;display:block}
</style>
</head>
<body>
<div class="wrap">
  <p class="brand">Interace Interior</p>
  <h1>인테리어 공사 체크리스트 300</h1>
  <p class="subtitle">공사 전 꼭 확인해야 할 항목들을 함께 체크해 보세요</p>
  <div class="info-card">
    <div class="info-grid">
      <div><p class="field-label">이름 <span>*</span></p><input type="text" id="f-name" placeholder="홍길동"></div>
      <div><p class="field-label">연락처 <span>*</span></p><input type="tel" id="f-phone" placeholder="010-0000-0000"></div>
    </div>
    <div class="info-grid three">
      <div><p class="field-label">지역</p>
        <select id="f-region"><option value="">선택</option><option>서울 동작구</option><option>서울 기타</option><option>경기도</option><option>인천</option><option>기타 수도권</option></select>
      </div>
      <div><p class="field-label">평수</p>
        <select id="f-size"><option value="">선택</option><option>20평 이하</option><option>21~30평</option><option>31~40평</option><option>41~50평</option><option>51평 이상</option></select>
      </div>
      <div><p class="field-label">공사 예정</p>
        <select id="f-timing"><option value="">선택</option><option>1개월 이내</option><option>3개월 이내</option><option>6개월 이내</option><option>아직 미정</option></select>
      </div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-top"><span class="progress-label">전체 진행률</span><span class="progress-count" id="prog-txt">0 / 300</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div id="checklist-area"></div>
  <button class="submit-btn" id="submit-btn" onclick="submitForm()">체크리스트 제출하기</button>
  <div class="success-box" id="success-box">
    <div class="icon">✓</div>
    <p>제출 완료!</p>
    <small>인테라스 인테리어팀이 곧 연락드릴게요 :)</small>
  </div>
</div>
<script>
const SHEET_URL="https://script.google.com/macros/s/AKfycbzbzZ7cpfrg6dYyvCs4QIBQ_Z2W6wx4hLLqG4Q7Eo3UVbPXAvzM4MmtqDXA3yy7MiRHLg/exec
";

let checked={},currentTab=0;
function totalChecked(){return Object.values(checked).filter(Boolean).length}
function updateProgress(){const t=totalChecked();document.getElementById('prog-txt').textContent=t+' / 300';document.getElementById('prog-fill').style.width=Math.round(t/300*100)+'%'}
function renderTabs(){const bar=document.getElementById('tab-bar');bar.innerHTML='';CATEGORIES.forEach((cat,i)=>{const cnt=cat.items.filter((_,j)=>checked[i+'-'+j]).length;const btn=document.createElement('button');btn.className='tab'+(i===currentTab?' active':'');btn.textContent=cat.name+' '+cnt+'/'+cat.items.length;btn.onclick=()=>{currentTab=i;renderTabs();renderList()};bar.appendChild(btn)})}
function renderList(){const area=document.getElementById('checklist-area');const cat=CATEGORIES[currentTab];let startNum=0;for(let i=0;i<currentTab;i++)startNum+=CATEGORIES[i].items.length;area.innerHTML='';const card=document.createElement('div');card.className='checklist-card';const hdr=document.createElement('div');hdr.className='cat-header';const done=cat.items.filter((_,j)=>checked[currentTab+'-'+j]).length;hdr.innerHTML='<span>'+cat.name+'</span><span>'+done+' / '+cat.items.length+' 완료</span>';card.appendChild(hdr);cat.items.forEach((item,j)=>{const key=currentTab+'-'+j;const isChecked=!!checked[key];const row=document.createElement('div');row.className='check-item'+(isChecked?' checked':'');row.innerHTML='<span class="num-badge">'+String(startNum+j+1).padStart(3,'0')+'</span><div class="check-box"></div><span class="item-text">'+item+'</span>';row.onclick=()=>{checked[key]=!checked[key];renderTabs();renderList();updateProgress()};card.appendChild(row)});area.appendChild(card)}
function submitForm(){const name=document.getElementById('f-name').value.trim();const phone=document.getElementById('f-phone').value.trim();if(!name||!phone){alert('이름과 연락처는 필수입니다!');return}const checkedItems=[];CATEGORIES.forEach((cat,i)=>{cat.items.forEach((item,j)=>{if(checked[i+'-'+j])checkedItems.push('['+cat.name+'] '+item)})});const payload={timestamp:new Date().toLocaleString('ko-KR'),name,phone,region:document.getElementById('f-region').value,size:document.getElementById('f-size').value,timing:document.getElementById('f-timing').value,total_checked:totalChecked(),checked_items:checkedItems.join('\n')};const btn=document.getElementById('submit-btn');btn.textContent='제출 중...';btn.disabled=true;fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).finally(()=>{document.getElementById('success-box').style.display='block';btn.style.display='none'})}
renderTabs();renderList();updateProgress();
</script>
